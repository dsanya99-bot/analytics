<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Редактор отчёта</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/assets/admin.css">
<style>
  body{height:100vh;overflow:hidden;display:flex;flex-direction:column;}
  .editor-head{display:flex;align-items:center;justify-content:space-between;gap:12px;
    padding:11px 18px;border-bottom:1px solid var(--line);background:rgba(7,9,13,.7);
    backdrop-filter:blur(14px);flex-wrap:wrap;}
  .editor-head .left{display:flex;align-items:center;gap:12px;min-width:0;}
  #report-name{font-weight:700;font-size:15px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:30vw;}
  .save-state{font-size:12px;color:var(--text-mute);white-space:nowrap;}
  .save-state.dirty{color:var(--warn);}
  .save-state.saved{color:var(--accent);}
  .editor-head .actions{display:flex;gap:8px;flex-wrap:wrap;}
  .panes{flex:1;display:grid;grid-template-columns:minmax(430px,1fr) 1.25fr;min-height:0;}
  .form-pane{overflow-y:auto;padding:18px 20px 40px;border-right:1px solid var(--line);}
  .preview-pane{position:relative;background:var(--bg-0);}
  #preview{width:100%;height:100%;border:0;display:block;}
  .kpi-strip{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:20px;}
  .sec-title{font-size:12px;letter-spacing:.14em;text-transform:uppercase;color:var(--text-mute);
    margin:6px 0 12px;font-weight:600;}
  .scen-tabs{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px;}
  .scen-tab{display:flex;align-items:center;gap:7px;padding:8px 12px;border-radius:9px;
    border:1px solid var(--line-2);background:rgba(255,255,255,.02);color:var(--text-dim);cursor:pointer;
    font-family:inherit;font-size:13px;transition:all .15s;}
  .scen-tab:hover{color:var(--text);}
  .scen-tab.active{background:var(--bg-3);color:var(--text);border-color:var(--accent);}
  .scen-tab .dot{width:9px;height:9px;border-radius:50%;}
  .presets{display:flex;gap:7px;margin-top:8px;align-items:center;flex-wrap:wrap;}
  .swatch{width:22px;height:22px;border-radius:6px;border:1px solid var(--line-2);cursor:pointer;padding:0;transition:transform .12s;}
  .swatch:hover{transform:scale(1.12);}
  .bd-row{display:grid;grid-template-columns:1fr 130px 34px;gap:8px;margin-bottom:8px;align-items:center;}
  .bd-row .x{border:1px solid var(--line-2);background:transparent;color:var(--danger);border-radius:8px;
    cursor:pointer;height:38px;font-size:16px;line-height:1;}
  .bd-row .x:hover{background:rgba(248,113,113,.12);}
  .bd-sum{font-size:12px;color:var(--text-mute);margin-top:4px;}
  .bd-sum.warn{color:var(--warn);}
  .gen-row{display:grid;grid-template-columns:1fr 1fr auto;gap:8px;align-items:end;margin-top:8px;}
  @media (max-width:900px){
    body{height:auto;overflow:auto;}
    .panes{grid-template-columns:1fr;}
    .preview-pane{height:80vh;}
    #report-name{max-width:50vw;}
    .kpi-strip{grid-template-columns:repeat(2,1fr);}
  }
</style>
</head>
<body>
  <header class="editor-head">
    <div class="left">
      <a class="btn btn-sm" href="/cabinet">← Кабинет</a>
      <span id="report-name">Загрузка…</span>
      <span id="status-badge" class="badge draft">черновик</span>
      <span id="save-state" class="save-state"></span>
    </div>
    <div class="actions">
      <button class="btn btn-sm" id="btn-open">Открыть отчёт</button>
      <button class="btn btn-sm" id="btn-copy">Копировать ссылку</button>
      <button class="btn btn-sm" id="btn-rotate" title="Сгенерировать новую ссылку, старая перестанет работать">Перевыпустить</button>
      <button class="btn btn-sm" id="btn-publish">Опубликовать</button>
      <button class="btn btn-sm btn-primary" id="btn-save">Сохранить</button>
    </div>
  </header>
  <div class="panes">
    <div class="form-pane">
      <div class="kpi-strip" id="kpi-strip"></div>
      <div class="sec-title">Проект</div>
      <div id="project-fields"></div>
      <div class="sec-title" style="margin-top:22px;">Сценарии</div>
      <div class="scen-tabs" id="scen-tabs"></div>
      <div id="scenario-fields"></div>
    </div>
    <div class="preview-pane">
      <iframe id="preview" src="/preview" title="Предпросмотр отчёта"></iframe>
    </div>
  </div>
  <div id="toast" class="toast"></div>
  <script src="/assets/engine.js"></script>
  <script src="/assets/editor.js"></script>
</body>
</html>
